apiVersion: apps/v1
kind: Deployment
metadata:
  name: kimbal-api
  namespace: kimbal
  labels:
    app: kimbal-api
spec:
  replicas: 3
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: kimbal-api
  template:
    metadata:
      labels:
        app: kimbal-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api
          image: ghcr.io/kimbal/kimbal-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: kimbal-api-config
            - secretRef:
                name: kimbal-api-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # uploads dir; move to object storage to enable
      initContainers:
        - name: migrate
          image: ghcr.io/kimbal/kimbal-api:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: kimbal-api-secrets
