apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cvum-api
  namespace: cvum
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "60m"        # uploads
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"     # SSE streams
    nginx.ingress.kubernetes.io/proxy-buffering: "off"        # stream tokens immediately
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts: [api.cvum.io]
      secretName: cvum-api-tls
  rules:
    - host: api.cvum.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cvum-api
                port:
                  number: 80
