name: cvum

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: cvum-postgres
    environment:
      POSTGRES_USER: cvum
      POSTGRES_PASSWORD: cvum_dev_password
      POSTGRES_DB: cvum
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - cvum_pgdata:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvum -d cvum"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cvum-redis
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - cvum_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  api:
    build: ./backend
    container_name: cvum-api
    profiles: ["full"]  # opt-in: `docker compose --profile full up` (local dev runs uvicorn directly)
    environment:
      DATABASE_URL: postgresql+asyncpg://cvum:cvum_dev_password@postgres:5432/cvum
      REDIS_URL: redis://redis:6379/0
      APP_ENV: production
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cvum_pgdata:
  cvum_redis:
