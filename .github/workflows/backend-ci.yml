name: backend-ci

on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]
  pull_request:
    paths: ["backend/**", ".github/workflows/backend-ci.yml"]

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: kimbal
          POSTGRES_PASSWORD: kimbal_dev_password
          POSTGRES_DB: kimbal_test
        ports: ["5433:5432"]
        options: >-
          --health-cmd "pg_isready -U kimbal"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Enable pgvector extension
        run: |
          sudo apt-get install -y postgresql-client >/dev/null
          PGPASSWORD=kimbal_dev_password psql -h localhost -p 5433 -U kimbal -d kimbal_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector; CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy core retrieval chat embeddings llm --ignore-missing-imports || true  # advisory until fully typed

      - name: Tests
        run: pytest -q --cov=. --cov-report=term-missing
        env:
          DATABASE_URL: postgresql+asyncpg://kimbal:kimbal_dev_password@localhost:5433/kimbal_test

      - name: Golden eval release gate
        run: python scripts/run_evals.py

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t kimbal-api:${{ github.sha }} .

      - name: Security scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: kimbal-api:${{ github.sha }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: docker-build
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Push image + apply manifests
        run: |
          echo "Push to ghcr.io and 'kubectl apply -f k8s/' happen here once cluster creds"
          echo "are configured as repo secrets (KUBE_CONFIG, GHCR_TOKEN)."
